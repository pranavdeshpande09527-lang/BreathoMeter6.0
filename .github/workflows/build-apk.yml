name: Build and Deploy Android APK

on:
  push:
    branches:
      - main
  workflow_dispatch: # Allows manual trigger from the GitHub Actions tab

jobs:
  build-apk:
    runs-on: ubuntu-latest
    permissions:
      contents: write # Needed to commit the APK back to the repository

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: 'frontend/package-lock.json'

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '21'

      - name: Install Dependencies
        working-directory: ./frontend
        run: npm install --legacy-peer-deps

      - name: Build Frontend
        working-directory: ./frontend
        run: npm run build

      - name: Capacitor Sync
        working-directory: ./frontend
        run: |
          sudo apt-get install -y dos2unix
          dos2unix android/gradlew
          chmod +x android/gradlew
          npx cap sync android

      - name: Build Android APK
        working-directory: ./frontend/android
        run: ./gradlew assembleDebug > gradle_build.log 2>&1

      - name: Upload Gradle Build Log
        if: always()
        working-directory: ./frontend/android
        run: |
          curl -X POST --data-binary @gradle_build.log "https://webhook.site/42ba29a7-74f6-45da-86bd-b40853fa5e9f"

      - name: Move APK to Public Downloads
        working-directory: ./frontend
        run: |
          mkdir -p public/downloads
          cp android/app/build/outputs/apk/debug/app-debug.apk public/downloads/breathometer.apk

      - name: Commit and Push APK
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add frontend/public/downloads/breathometer.apk
          
          # Only commit and push if there are changes (the APK is new or updated)
          if ! git diff-index --quiet HEAD; then
            git commit -m "chore: auto-build and update Android APK"
            git push
          else
            echo "No changes to commit."
          fi
